<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" width="520" height="560" role="img" aria-label="The six-folder workspace spine listed vertically from 0-context to 5-personal, each row carrying a colored tier badge showing whether it is private, team, or external.">
  <title>The six-folder workspace spine, each row tagged with its sync tier</title>
  <style>
    .label { font-family: "Instrument Sans", system-ui, sans-serif; fill: #8a8a8a; }
    .mono  { font-family: ui-monospace, monospace; }
    .num   { font-family: ui-monospace, monospace; fill: #8a8a8a; }

    @keyframes spineDraw {
      0%   { stroke-dashoffset: 12; opacity: 0.3; }
      50%  { stroke-dashoffset: 0;  opacity: 0.7; }
      100% { stroke-dashoffset: 12; opacity: 0.3; }
    }
    .spine { stroke-dasharray: 4 8; animation: spineDraw 6s linear infinite; }

    @keyframes badgeBreathe {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }
    .badge { transform-box: fill-box; transform-origin: center; animation: badgeBreathe 4s ease-in-out infinite; }
    .b1 { animation-delay: 0s; }
    .b2 { animation-delay: .5s; }
    .b3 { animation-delay: 1s; }
    .b4 { animation-delay: 1.5s; }
    .b5 { animation-delay: 2s; }
    .b6 { animation-delay: 2.5s; }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- header -->
  <text class="label" x="44" y="48" font-size="11" font-weight="600" letter-spacing="0.08em">WORKSPACE SPINE</text>

  <!-- vertical spine line through the node markers -->
  <line class="spine" x1="56" y1="86" x2="56" y2="470" stroke="#8a8a8a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ========== rows ========== -->
  <!-- row template: node circle on spine, number, mono name, tier badge -->

  <!-- 0-context : team -->
  <g transform="translate(0,98)">
    <circle cx="56" cy="0" r="5" fill="#fafaf8" stroke="#8b5cf6" stroke-width="2"/>
    <text class="num" x="86" y="5" font-size="14">0</text>
    <text class="mono" x="106" y="5" font-size="15" fill="#8a8a8a">context</text>
    <g class="badge b1">
      <rect x="372" y="-11" width="64" height="22" rx="11" fill="none" stroke="#8b5cf6" stroke-width="1.4"/>
      <circle cx="386" cy="0" r="3.5" fill="#8b5cf6"/>
      <text class="mono" x="396" y="4" font-size="11" fill="#8a8a8a">team</text>
    </g>
  </g>

  <!-- 1-inbox : private -->
  <g transform="translate(0,160)">
    <circle cx="56" cy="0" r="5" fill="#fafaf8" stroke="#8a8a8a" stroke-width="2"/>
    <text class="num" x="86" y="5" font-size="14">1</text>
    <text class="mono" x="106" y="5" font-size="15" fill="#8a8a8a">inbox</text>
    <g class="badge b2">
      <rect x="372" y="-11" width="76" height="22" rx="11" fill="none" stroke="#8a8a8a" stroke-width="1.4" stroke-dasharray="3 3"/>
      <circle cx="386" cy="0" r="3.5" fill="none" stroke="#8a8a8a" stroke-width="1.4"/>
      <text class="mono" x="396" y="4" font-size="11" fill="#8a8a8a">private</text>
    </g>
  </g>

  <!-- 2-work : team -->
  <g transform="translate(0,222)">
    <circle cx="56" cy="0" r="5" fill="#fafaf8" stroke="#8b5cf6" stroke-width="2"/>
    <text class="num" x="86" y="5" font-size="14">2</text>
    <text class="mono" x="106" y="5" font-size="15" fill="#8a8a8a">work</text>
    <g class="badge b3">
      <rect x="372" y="-11" width="64" height="22" rx="11" fill="none" stroke="#8b5cf6" stroke-width="1.4"/>
      <circle cx="386" cy="0" r="3.5" fill="#8b5cf6"/>
      <text class="mono" x="396" y="4" font-size="11" fill="#8a8a8a">team</text>
    </g>
  </g>

  <!-- 3-log : private -->
  <g transform="translate(0,284)">
    <circle cx="56" cy="0" r="5" fill="#fafaf8" stroke="#8a8a8a" stroke-width="2"/>
    <text class="num" x="86" y="5" font-size="14">3</text>
    <text class="mono" x="106" y="5" font-size="15" fill="#8a8a8a">log</text>
    <g class="badge b4">
      <rect x="372" y="-11" width="76" height="22" rx="11" fill="none" stroke="#8a8a8a" stroke-width="1.4" stroke-dasharray="3 3"/>
      <circle cx="386" cy="0" r="3.5" fill="none" stroke="#8a8a8a" stroke-width="1.4"/>
      <text class="mono" x="396" y="4" font-size="11" fill="#8a8a8a">private</text>
    </g>
  </g>

  <!-- 4-shared : external -->
  <g transform="translate(0,346)">
    <circle cx="56" cy="0" r="5" fill="#fafaf8" stroke="#84cc16" stroke-width="2"/>
    <text class="num" x="86" y="5" font-size="14">4</text>
    <text class="mono" x="106" y="5" font-size="15" fill="#8a8a8a">shared</text>
    <g class="badge b5">
      <rect x="372" y="-11" width="82" height="22" rx="11" fill="none" stroke="#84cc16" stroke-width="1.4"/>
      <circle cx="386" cy="0" r="3.5" fill="#84cc16"/>
      <text class="mono" x="396" y="4" font-size="11" fill="#8a8a8a">external</text>
    </g>
  </g>

  <!-- 5-personal : private -->
  <g transform="translate(0,408)">
    <circle cx="56" cy="0" r="5" fill="#fafaf8" stroke="#8a8a8a" stroke-width="2"/>
    <text class="num" x="86" y="5" font-size="14">5</text>
    <text class="mono" x="106" y="5" font-size="15" fill="#8a8a8a">personal</text>
    <g class="badge b6">
      <rect x="372" y="-11" width="76" height="22" rx="11" fill="none" stroke="#8a8a8a" stroke-width="1.4" stroke-dasharray="3 3"/>
      <circle cx="386" cy="0" r="3.5" fill="none" stroke="#8a8a8a" stroke-width="1.4"/>
      <text class="mono" x="396" y="4" font-size="11" fill="#8a8a8a">private</text>
    </g>
  </g>

  <!-- legend -->
  <g transform="translate(44,500)">
    <text class="label" x="0" y="0" font-size="11" font-weight="600" letter-spacing="0.06em">SYNC TIER</text>
    <circle cx="6" cy="24" r="4.5" fill="#8b5cf6"/>
    <text class="label" x="18" y="28" font-size="12">team — pushes to the brain</text>
    <circle cx="206" cy="24" r="4.5" fill="#84cc16"/>
    <text class="label" x="218" y="28" font-size="12">external — syncs outward</text>
    <circle cx="6" cy="44" r="4.5" fill="none" stroke="#8a8a8a" stroke-width="1.4"/>
    <text class="label" x="18" y="48" font-size="12">private — never leaves your machine</text>
  </g>
</svg>
