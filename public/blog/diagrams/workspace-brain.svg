<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460" role="img" aria-label="Four private individual workspaces on the left push team-tier work along connectors into one central team brain hub, and a single client-tier flow runs outward from the brain to a client node on the right.">
  <title>Private workspaces push team-tier work into one team brain, which flows some work out to clients</title>
  <style>
    .label { font-family: "Instrument Sans", system-ui, sans-serif; fill: #8a8a8a; }
    .mono  { font-family: ui-monospace, monospace; fill: #8a8a8a; }

    @keyframes hubPulse {
      0%, 100% { transform: scale(1);    opacity: 0.9; }
      50%      { transform: scale(1.035); opacity: 1;   }
    }
    @keyframes ringBreathe {
      0%, 100% { opacity: 0.25; }
      50%      { opacity: 0.55; }
    }
    .hub-core { transform-box: fill-box; transform-origin: center; animation: hubPulse 4.5s ease-in-out infinite; }
    .hub-ring { animation: ringBreathe 4.5s ease-in-out infinite; }

    /* packets travelling along connectors */
    .pkt { offset-rotate: 0deg; }
    @keyframes flowA { from { offset-distance: 0%; } to { offset-distance: 100%; } }
    .pktA1 { offset-path: path("M 196 96 C 320 120, 380 190, 470 222"); animation: flowA 5s ease-in-out infinite; }
    .pktA2 { offset-path: path("M 196 190 C 300 200, 360 212, 470 226"); animation: flowA 4.4s ease-in-out infinite 1.1s; }
    .pktA3 { offset-path: path("M 196 284 C 300 268, 360 250, 470 234"); animation: flowA 5.6s ease-in-out infinite 0.5s; }
    .pktA4 { offset-path: path("M 196 378 C 320 348, 380 286, 470 244"); animation: flowA 4.8s ease-in-out infinite 1.8s; }

    /* single client outflow */
    .pktOut { offset-path: path("M 650 230 L 760 230"); animation: flowA 5.2s ease-in-out infinite 0.8s; }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- ================= inbound connectors ================= -->
  <g fill="none" stroke-linecap="round">
    <path d="M 196 96  C 320 120, 380 190, 470 222" stroke="#8a8a8a" stroke-width="1.25" opacity="0.45"/>
    <path d="M 196 190 C 300 200, 360 212, 470 226" stroke="#8a8a8a" stroke-width="1.25" opacity="0.45"/>
    <path d="M 196 284 C 300 268, 360 250, 470 234" stroke="#8a8a8a" stroke-width="1.25" opacity="0.45"/>
    <path d="M 196 378 C 320 348, 380 286, 470 244" stroke="#8a8a8a" stroke-width="1.25" opacity="0.45"/>
  </g>

  <!-- ================= client outflow connector ================= -->
  <path d="M 650 230 L 752 230" fill="none" stroke="#84cc16" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 760 230 l -10 -5 v 10 z" fill="#84cc16" opacity="0.8"/>

  <!-- ================= workspaces (left) =================
       clean rounded card: person glyph + label + hollow PRIVATE ring -->
  <g>
    <!-- WS 1 -->
    <g transform="translate(64,66)">
      <rect x="0" y="14" width="120" height="60" rx="8" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <circle cx="26" cy="44" r="7" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <path d="M 16 60 a 10 10 0 0 1 20 0" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <circle cx="104" cy="30" r="4.5" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <text class="label" x="48" y="48" font-size="13" font-weight="500">workspace</text>
    </g>
    <!-- WS 2 -->
    <g transform="translate(64,160)">
      <rect x="0" y="14" width="120" height="60" rx="8" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <circle cx="26" cy="44" r="7" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <path d="M 16 60 a 10 10 0 0 1 20 0" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <circle cx="104" cy="30" r="4.5" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <text class="label" x="48" y="48" font-size="13" font-weight="500">workspace</text>
    </g>
    <!-- WS 3 -->
    <g transform="translate(64,254)">
      <rect x="0" y="14" width="120" height="60" rx="8" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <circle cx="26" cy="44" r="7" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <path d="M 16 60 a 10 10 0 0 1 20 0" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <circle cx="104" cy="30" r="4.5" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <text class="label" x="48" y="48" font-size="13" font-weight="500">workspace</text>
    </g>
    <!-- WS 4 -->
    <g transform="translate(64,348)">
      <rect x="0" y="14" width="120" height="60" rx="8" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <circle cx="26" cy="44" r="7" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <path d="M 16 60 a 10 10 0 0 1 20 0" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <circle cx="104" cy="30" r="4.5" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
      <text class="label" x="48" y="48" font-size="13" font-weight="500">workspace</text>
    </g>
  </g>

  <!-- ================= packets in flight (team-tier, violet) =================
       base x/y place each packet partway along its connector so a
       rasterizer without offset-path support still renders them on-line. -->
  <g>
    <rect class="pkt pktA1" x="318" y="142" width="8" height="8" rx="2" fill="#8b5cf6"/>
    <rect class="pkt pktA2" x="320" y="200" width="8" height="8" rx="2" fill="#8b5cf6"/>
    <rect class="pkt pktA3" x="320" y="256" width="8" height="8" rx="2" fill="#8b5cf6"/>
    <rect class="pkt pktA4" x="318" y="312" width="8" height="8" rx="2" fill="#8b5cf6"/>
  </g>

  <!-- ================= team brain hub (center) ================= -->
  <g transform="translate(560,230)">
    <circle class="hub-ring" cx="0" cy="0" r="92" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.35"/>
    <circle class="hub-ring" cx="0" cy="0" r="72" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.45"/>
    <g class="hub-core">
      <circle cx="0" cy="0" r="54" fill="none" stroke="#8b5cf6" stroke-width="2"/>
      <!-- inner memory nodes: team (violet), with one client (lime) facing the outflow -->
      <circle cx="0" cy="-22" r="3.5" fill="#8b5cf6"/>
      <circle cx="-20" cy="8" r="3.5" fill="#8b5cf6"/>
      <circle cx="20" cy="8" r="3.5" fill="#84cc16"/>
      <circle cx="0" cy="20" r="3.5" fill="#8b5cf6"/>
      <path d="M 0 -22 L -20 8 M 0 -22 L 20 8 M -20 8 L 0 20 M 20 8 L 0 20" fill="none" stroke="#8a8a8a" stroke-width="1.1" opacity="0.6"/>
    </g>
    <text class="label" x="0" y="80" font-size="15" font-weight="600" text-anchor="middle" fill="#8a8a8a">team brain</text>
  </g>

  <!-- ================= client outflow packet (lime) ================= -->
  <rect class="pkt pktOut" x="700" y="226" width="8" height="8" rx="2" fill="#84cc16"/>

  <!-- ================= client node (right) ================= -->
  <g transform="translate(800,230)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#84cc16" stroke-width="1.5"/>
    <circle cx="0" cy="-5" r="6" fill="none" stroke="#84cc16" stroke-width="1.5"/>
    <path d="M -9 11 a 9 9 0 0 1 18 0" fill="none" stroke="#84cc16" stroke-width="1.5"/>
    <text class="label" x="0" y="44" font-size="13" font-weight="500" text-anchor="middle">client</text>
  </g>

  <!-- ================= legend ================= -->
  <g transform="translate(724,86)">
    <text class="label" x="0" y="0" font-size="11" font-weight="600" letter-spacing="0.06em">TIER</text>
    <circle cx="6" cy="22" r="4.5" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
    <text class="mono" x="20" y="26" font-size="12">private</text>
    <circle cx="6" cy="46" r="4.5" fill="#8b5cf6"/>
    <text class="mono" x="20" y="50" font-size="12">team</text>
    <circle cx="6" cy="70" r="4.5" fill="#84cc16"/>
    <text class="mono" x="20" y="74" font-size="12">client</text>
  </g>

  <text class="label" x="124" y="36" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.06em" opacity="0.85">PRIVATE WORKSPACES</text>
</svg>
