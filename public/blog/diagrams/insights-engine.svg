<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 760" width="880" height="760" role="img" aria-label="The Insights Engine as a vertical pipeline: sources feed an ingestion layer, grains are extracted into typed context units, sorted across three memory tiers (working, episodic, semantic), composed into a context window, and answered through a query interface, with a feedback loop returning down the right side.">
  <title>The Insights Engine pipeline — from raw sources through grain extraction and tiered memory to a composed, cited query answer</title>
  <style>
    .label { font-family: "Instrument Sans", system-ui, sans-serif; fill: #8a8a8a; }
    .mono  { font-family: ui-monospace, monospace; fill: #8a8a8a; }
    .head  { font-family: "Instrument Sans", system-ui, sans-serif; fill: #8a8a8a; font-weight: 600; }

    /* travelling packets down the spine */
    .pkt { offset-rotate: 0deg; }
    @keyframes flow { from { offset-distance: 0%; } to { offset-distance: 100%; } }
    .pk1 { offset-path: path("M 440 96 L 440 150"); animation: flow 3.2s ease-in-out infinite; }
    .pk2 { offset-path: path("M 440 212 L 440 266"); animation: flow 3.4s ease-in-out infinite .4s; }
    .pk3 { offset-path: path("M 440 360 L 440 414"); animation: flow 3.6s ease-in-out infinite .8s; }
    .pk4 { offset-path: path("M 440 540 L 440 594"); animation: flow 3.4s ease-in-out infinite .2s; }
    .pk5 { offset-path: path("M 440 656 L 440 700"); animation: flow 3.2s ease-in-out infinite .6s; }

    @keyframes breathe { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
    .b1 { animation: breathe 4s ease-in-out infinite; }
    .b2 { animation: breathe 4s ease-in-out infinite .7s; }
    .b3 { animation: breathe 4s ease-in-out infinite 1.4s; }

    @keyframes corePulse { 0%,100% { transform: scale(1); opacity: .9; } 50% { transform: scale(1.06); opacity: 1; } }
    .core { transform-box: fill-box; transform-origin: center; animation: corePulse 5s ease-in-out infinite; }

    /* feedback loop dashes crawling upward */
    @keyframes crawl { to { stroke-dashoffset: -16; } }
    .loop { stroke-dasharray: 4 8; animation: crawl 6s linear infinite; }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- ===================== spine connectors ===================== -->
  <g fill="none" stroke="#8a8a8a" stroke-width="1.25" stroke-linecap="round" opacity="0.5">
    <line x1="440" y1="96"  x2="440" y2="150"/>
    <line x1="440" y1="212" x2="440" y2="266"/>
    <line x1="440" y1="360" x2="440" y2="414"/>
    <line x1="440" y1="540" x2="440" y2="594"/>
    <line x1="440" y1="656" x2="440" y2="700"/>
  </g>

  <!-- ===================== feedback loop (right side, upward) ===================== -->
  <path class="loop" d="M 644 730 C 858 730, 858 60, 482 60"
        fill="none" stroke="#10b981" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <path d="M 482 60 l 10 -5 v 10 z" fill="#10b981" opacity="0.8"/>
  <text class="label" x="852" y="392" font-size="11" font-weight="600" text-anchor="middle"
        letter-spacing="0.06em" transform="rotate(90 852 392)" opacity="0.8">FEEDBACK LOOP</text>

  <!-- ===================== 1. INGESTION LAYER ===================== -->
  <g transform="translate(240,30)">
    <rect x="0" y="0" width="400" height="66" rx="10" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
    <text class="head" x="200" y="28" font-size="15" text-anchor="middle">Ingestion layer</text>
    <text class="mono" x="200" y="49" font-size="11.5" text-anchor="middle">Slack · Notion · Linear · GitHub · Drive · meeting notes</text>
  </g>
  <rect class="pkt pk1" x="436" y="118" width="8" height="8" rx="2" fill="#8b5cf6"/>

  <!-- ===================== 2. GRAIN EXTRACTION ===================== -->
  <g transform="translate(270,150)">
    <rect x="0" y="0" width="340" height="62" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <text class="head" x="170" y="27" font-size="15" text-anchor="middle" fill="#8b5cf6">Grain extraction</text>
    <text class="label" x="170" y="46" font-size="11.5" text-anchor="middle">decompose into typed, timestamped context units</text>
  </g>
  <text class="mono" x="448" y="244" font-size="10.5" opacity="0.85">indexed across</text>
  <rect class="pkt pk2" x="436" y="234" width="8" height="8" rx="2" fill="#8b5cf6"/>

  <!-- ===================== 3. GRAIN DIMENSIONS ===================== -->
  <g transform="translate(70,278)">
    <text class="head" x="370" y="-6" font-size="11" text-anchor="middle" letter-spacing="0.06em">GRAIN DIMENSIONS</text>
    <!-- five pills -->
    <g class="mono" font-size="11.5" text-anchor="middle">
      <g transform="translate(0,4)">
        <rect width="128" height="30" rx="15" fill="none" stroke="#8a8a8a" stroke-width="1.4"/>
        <circle class="b1" cx="16" cy="15" r="3.5" fill="#8b5cf6"/>
        <text x="74" y="19">temporal</text>
      </g>
      <g transform="translate(150,4)">
        <rect width="132" height="30" rx="15" fill="none" stroke="#8a8a8a" stroke-width="1.4"/>
        <circle class="b2" cx="16" cy="15" r="3.5" fill="#8b5cf6"/>
        <text x="76" y="19">semantic</text>
      </g>
      <g transform="translate(304,4)">
        <rect width="112" height="30" rx="15" fill="none" stroke="#8a8a8a" stroke-width="1.4"/>
        <circle class="b3" cx="16" cy="15" r="3.5" fill="#8b5cf6"/>
        <text x="66" y="19">entity</text>
      </g>
      <g transform="translate(438,4)">
        <rect width="132" height="30" rx="15" fill="none" stroke="#8a8a8a" stroke-width="1.4"/>
        <circle class="b1" cx="16" cy="15" r="3.5" fill="#c026d3"/>
        <text x="78" y="19">signal type</text>
      </g>
      <g transform="translate(592,4)">
        <rect width="108" height="30" rx="15" fill="none" stroke="#8a8a8a" stroke-width="1.4"/>
        <circle class="b2" cx="16" cy="15" r="3.5" fill="#8b5cf6"/>
        <text x="64" y="19">actor</text>
      </g>
    </g>
  </g>
  <rect class="pkt pk3" x="436" y="382" width="8" height="8" rx="2" fill="#8b5cf6"/>

  <!-- ===================== 4. MEMORY TIERS ===================== -->
  <g transform="translate(70,414)">
    <text class="head" x="370" y="-6" font-size="11" text-anchor="middle" letter-spacing="0.06em">MEMORY TIERS</text>

    <!-- Working -->
    <g transform="translate(0,4)">
      <rect width="218" height="98" rx="10" fill="none" stroke="#84cc16" stroke-width="1.5"/>
      <circle cx="20" cy="22" r="4" fill="#84cc16"/>
      <text class="head" x="36" y="26" font-size="13.5" fill="#84cc16">Working</text>
      <text class="mono" x="20" y="48" font-size="10.5">hot · 7–30 day window</text>
      <text class="label" x="20" y="68" font-size="10.5">open tickets, active PRs</text>
      <text class="label" x="20" y="84" font-size="10.5">recent threads, decisions</text>
    </g>
    <!-- Episodic -->
    <g transform="translate(266,4)">
      <rect width="218" height="98" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="20" cy="22" r="4" fill="#8b5cf6"/>
      <text class="head" x="36" y="26" font-size="13.5" fill="#8b5cf6">Episodic</text>
      <text class="mono" x="20" y="48" font-size="10.5">warm · 1–12 months</text>
      <text class="label" x="20" y="68" font-size="10.5">completed sprints</text>
      <text class="label" x="20" y="84" font-size="10.5">shipped work, retros</text>
    </g>
    <!-- Semantic -->
    <g transform="translate(532,4)">
      <rect width="218" height="98" rx="10" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <circle cx="20" cy="22" r="4" fill="#10b981"/>
      <text class="head" x="36" y="26" font-size="13.5" fill="#10b981">Semantic</text>
      <text class="mono" x="20" y="48" font-size="10.5">cold · permanent</text>
      <text class="label" x="20" y="68" font-size="10.5">principles, playbooks</text>
      <text class="label" x="20" y="84" font-size="10.5">team &amp; institutional context</text>
    </g>

    <!-- compress / distill transition arrows -->
    <g fill="none" stroke="#8a8a8a" stroke-width="1.25" stroke-linecap="round" opacity="0.55">
      <line x1="218" y1="53" x2="262" y2="53"/>
      <line x1="484" y1="53" x2="528" y2="53"/>
    </g>
    <path d="M 262 53 l -9 -4 v 8 z" fill="#8a8a8a" opacity="0.7"/>
    <path d="M 528 53 l -9 -4 v 8 z" fill="#8a8a8a" opacity="0.7"/>
    <text class="mono" x="240" y="44" font-size="10" text-anchor="middle" opacity="0.85">compress</text>
    <text class="mono" x="506" y="44" font-size="10" text-anchor="middle" opacity="0.85">distill</text>
  </g>
  <rect class="pkt pk4" x="436" y="562" width="8" height="8" rx="2" fill="#8b5cf6"/>

  <!-- ===================== 5. CONTEXT WINDOW COMPOSER ===================== -->
  <g transform="translate(240,594)">
    <rect x="0" y="0" width="400" height="62" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- composer core glyph -->
    <g class="core" transform="translate(34,31)">
      <circle cx="0" cy="0" r="13" fill="none" stroke="#8b5cf6" stroke-width="1.6"/>
      <circle cx="0" cy="0" r="3" fill="#8b5cf6"/>
    </g>
    <text class="head" x="216" y="27" font-size="15" text-anchor="middle" fill="#8b5cf6">Context window composer</text>
    <text class="label" x="216" y="46" font-size="11" text-anchor="middle">rank · deduplicate · suppress stale · enforce token budget</text>
  </g>
  <rect class="pkt pk5" x="436" y="678" width="8" height="8" rx="2" fill="#84cc16"/>

  <!-- ===================== 6. QUERY INTERFACE ===================== -->
  <g transform="translate(240,700)">
    <rect x="0" y="0" width="400" height="60" rx="10" fill="none" stroke="#84cc16" stroke-width="1.5"/>
    <text class="head" x="200" y="26" font-size="15" text-anchor="middle" fill="#84cc16">Query interface</text>
    <text class="mono" x="200" y="46" font-size="10.5" text-anchor="middle">natural language → intent → grain retrieval → cited response</text>
  </g>

  <!-- ===================== legend ===================== -->
  <g transform="translate(40,30)">
    <text class="head" x="0" y="0" font-size="11" letter-spacing="0.06em">TEMPERATURE</text>
    <circle cx="6" cy="22" r="4.5" fill="#84cc16"/>
    <text class="mono" x="18" y="26" font-size="11">hot</text>
    <circle cx="6" cy="44" r="4.5" fill="#8b5cf6"/>
    <text class="mono" x="18" y="48" font-size="11">warm</text>
    <circle cx="6" cy="66" r="4.5" fill="#10b981"/>
    <text class="mono" x="18" y="70" font-size="11">cold</text>
  </g>
</svg>
